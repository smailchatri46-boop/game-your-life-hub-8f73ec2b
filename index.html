<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neyler — Habit & Life Tracker</title>
    <!-- Favicon configuration for browsers and search engines -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/neyler-logo.png" />
    <link rel="shortcut icon" href="/favicon.png" />
    
    <!-- Endorsely Affiliate Tracking Script -->
    <script async src="https://assets.endorsely.com/endorsely.js" data-endorsely="b6603ddd-9a20-453a-ad37-2b1d95f16810"></script>
    
    <!-- Preconnect to external domains for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://www.youtube.com">
    <link rel="preconnect" href="https://i.ytimg.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="https://dsnaslcvocithsjkrsup.supabase.co">
    <link rel="dns-prefetch" href="https://img.youtube.com">
    
    <!-- Preload critical above-fold images -->
    <link rel="preload" as="image" href="/neyler-logo.png" fetchpriority="high">
    <link rel="preload" as="image" href="/images/neyler-logo-full.png" fetchpriority="high">
    
    <!-- Optimized font loading with display swap -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    </noscript>
    
    <meta name="description" content="Turn your life into a game. Track habits, mood, progress, and journaling with Neyler." />
    <meta name="author" content="Neyler" />

    <meta property="og:title" content="Neyler — Habit & Life Tracker" />
    <meta property="og:description" content="Turn your life into a game. Track habits, mood, progress, and journaling." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Neyler" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <!-- Critical CSS for initial paint -->
    <style>
      /* Prevent FOUC and reduce CLS */
      html { visibility: visible; opacity: 1; }
      body { margin: 0; }
      #root { min-height: 100vh; }
      
      /* Image loading placeholder for CLS prevention */
      img { 
        background-color: transparent;
      }
      
      /* Emoji rendering (consistent cross-platform emoji images) */
      img.emoji {
        height: 1em;
        width: 1em;
        margin: 0 0.05em 0 0.1em;
        vertical-align: -0.15em;
        display: inline-block !important;
        object-fit: contain;
      }
      /* Ensure emoji images in larger contexts scale properly */
      .text-xl img.emoji,
      .text-2xl img.emoji,
      .text-3xl img.emoji,
      .text-4xl img.emoji,
      .text-5xl img.emoji {
        height: 1em;
        width: 1em;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
