      /* Hide native emojis, show Twemoji images instead */
      img.emoji {
        height: 1em;
        width: 1em;
        margin: 0 0.05em 0 0.1em;
        vertical-align: -0.15em;
        display: inline-block !important;

      .text-2xl img.emoji,
      .text-3xl img.emoji,
      .text-4xl img.emoji,
