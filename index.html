<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neyler — Habit & Life Tracker</title>
    
    <!-- Favicon configuration for browsers and Google Search -->
    <!-- Primary favicon for browsers -->
    <link rel="icon" href="/favicon.png" type="image/png" sizes="48x48" />
    <link rel="icon" href="/favicon.png" type="image/png" sizes="32x32" />
    <link rel="icon" href="/favicon.png" type="image/png" sizes="16x16" />
    <!-- Apple Touch Icon for iOS -->
    <link rel="apple-touch-icon" href="/favicon.png" sizes="180x180" />
    <!-- Shortcut icon fallback -->
    <link rel="shortcut icon" href="/favicon.png" type="image/png" />
    
    <!-- Endorsely Affiliate Tracking Script -->
    <script async src="https://assets.endorsely.com/endorsely.js" data-endorsely="b6603ddd-9a20-453a-ad37-2b1d95f16810"></script>
    
    <!-- Preconnect to external domains for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://www.youtube.com">
    <link rel="preconnect" href="https://i.ytimg.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="https://dsnaslcvocithsjkrsup.supabase.co">
    <link rel="dns-prefetch" href="https://img.youtube.com">
    
    <!-- Preload critical above-fold images -->
    <link rel="preload" as="image" href="/neyler-logo.png" fetchpriority="high">
    <link rel="preload" as="image" href="/images/neyler-logo-full.png" fetchpriority="high">
    
    <!-- Optimized font loading with display swap -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    </noscript>
    
    <meta name="description" content="Turn your life into a game. Track habits, mood, progress, and journaling with Neyler. The most beautiful AI-powered habit tracker." />
    <meta name="author" content="Neyler" />
    <meta name="keywords" content="habit tracker, life tracker, goal setting, AI coach, productivity, self-improvement, mood tracking, journaling" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://neyler.com/" />

    <!-- Open Graph -->
    <meta property="og:title" content="Neyler — Habit & Life Tracker" />
    <meta property="og:description" content="Turn your life into a game. Track habits, mood, progress, and journaling with AI." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://neyler.com/" />
    <meta property="og:image" content="https://neyler.com/favicon.png" />
    <meta property="og:site_name" content="Neyler" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Neyler" />
    <meta name="twitter:title" content="Neyler — Habit & Life Tracker" />
    <meta name="twitter:description" content="Turn your life into a game. Track habits, mood, progress, and journaling with AI." />
    <meta name="twitter:image" content="https://neyler.com/favicon.png" />

    <!-- JSON-LD Structured Data for Google Sitelinks -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Neyler",
      "alternateName": "Neyler Habit Tracker",
      "url": "https://neyler.com/",
      "description": "Turn your life into a game. Track habits, mood, progress, and journaling with Neyler.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://neyler.com/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Neyler",
      "applicationCategory": "LifestyleApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "description": "The most beautiful AI-powered habit and life tracker. Track habits, set goals, journal, and get personalized AI coaching.",
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "ratingCount": "150"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Neyler",
      "url": "https://neyler.com/",
      "logo": "https://neyler.com/favicon.png",
      "sameAs": [],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "url": "https://neyler.com/contact"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "itemListElement": [
        {
          "@type": "SiteNavigationElement",
          "position": 1,
          "name": "Pricing",
          "description": "View Neyler pricing plans and features",
          "url": "https://neyler.com/pricing"
        },
        {
          "@type": "SiteNavigationElement",
          "position": 2,
          "name": "FAQ",
          "description": "Frequently asked questions about Neyler",
          "url": "https://neyler.com/faq"
        },
        {
          "@type": "SiteNavigationElement",
          "position": 3,
          "name": "Sign Up",
          "description": "Create your free Neyler account",
          "url": "https://neyler.com/signup"
        },
        {
          "@type": "SiteNavigationElement",
          "position": 4,
          "name": "About",
          "description": "Learn about Neyler and our mission",
          "url": "https://neyler.com/about"
        },
        {
          "@type": "SiteNavigationElement",
          "position": 5,
          "name": "Contact",
          "description": "Get in touch with the Neyler team",
          "url": "https://neyler.com/contact"
        }
      ]
    }
    </script>

    <!-- Critical CSS for initial paint -->
    <style>
      /* Prevent FOUC and reduce CLS */
      html { visibility: visible; opacity: 1; }
      body { margin: 0; }
      #root { min-height: 100vh; }
      
      /* Image loading placeholder for CLS prevention */
      img { 
        background-color: transparent;
      }
      
      /* Emoji rendering (consistent cross-platform emoji images) */
      img.emoji {
        height: 1em;
        width: 1em;
        margin: 0 0.05em 0 0.1em;
        vertical-align: -0.15em;
        display: inline-block !important;
        object-fit: contain;
      }
      /* Ensure emoji images in larger contexts scale properly */
      .text-xl img.emoji,
      .text-2xl img.emoji,
      .text-3xl img.emoji,
      .text-4xl img.emoji,
      .text-5xl img.emoji {
        height: 1em;
        width: 1em;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
